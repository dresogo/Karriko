<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellenanzeige | Karriko</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .job-hero { margin-top: var(--navbar-height); position: relative; }
        .job-hero img { width: 100%; height: 300px; object-fit: cover; }
        .job-hero::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 50%; background: linear-gradient(transparent, var(--bg-color)); }
        .job-detail-card { background: var(--surface); border-radius: var(--radius-xl); padding: 2rem; box-shadow: var(--shadow-md); border: 1px solid var(--border-light); margin-top: -60px; position: relative; z-index: 5; }
        .job-info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
        .job-info-item { display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .job-info-item i { color: var(--primary); }
        .job-section { margin-top: 2rem; }
        .job-section h3 { margin-bottom: 0.75rem; }
        .apply-card { background: var(--surface); border-radius: var(--radius-xl); padding: 2rem; box-shadow: var(--shadow-md); border: 1px solid var(--border-light); position: sticky; top: calc(var(--navbar-height) + 1rem); }
    </style>
</head>
<body>
    <nav class="navbar glass" id="main-navbar">
        <div class="logo"><a href="index.html">Karriko</a><span class="logo-dot"></span></div>
        <div class="nav-actions">
            <a href="jobs.html" class="nav-link">← Alle Stellen</a>
        </div>
    </nav>

    <div class="job-hero">
        <img id="job-image" src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1200&q=80" alt="Job" />
    </div>

    <div class="container" style="padding-bottom: 4rem">
        <div class="grid" style="grid-template-columns: 2fr 1fr; gap: 2rem; align-items: start">
            <div class="job-detail-card">
                <h1 id="job-title" style="font-size: 1.75rem; margin-bottom: 0.5rem">Lade...</h1>
                <a id="job-company-link" href="#" style="color: var(--primary); font-weight: 600; font-size: 1.05rem" class="meta-item">
                    <i data-lucide="building-2" style="width:16px; height:16px"></i>
                    <span id="job-company">Firma</span>
                </a>

                <div class="job-info-grid" id="job-info-grid"></div>

                <div class="job-section">
                    <h3>Beschreibung</h3>
                    <p id="job-description" style="color: var(--text-secondary); line-height: 1.8"></p>
                </div>

                <div class="job-section">
                    <h3>Anforderungen</h3>
                    <p id="job-requirements" style="color: var(--text-secondary); line-height: 1.8"></p>
                </div>
            </div>

            <div class="apply-card" style="margin-top: -60px">
                <h3 style="margin-bottom: 1rem">Jetzt bewerben</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem">Sende deine Bewerbung direkt über Karriko.</p>

                <div id="apply-auth-notice" class="hidden">
                    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem">Du musst angemeldet sein, um dich zu bewerben.</p>
                    <button class="btn btn-primary btn-full" onclick="window.location.href='index.html'">Anmelden</button>
                </div>

                <form id="apply-form" class="hidden">
                    <div class="input-group">
                        <label>Nachricht (optional)</label>
                        <textarea id="apply-message" rows="4" placeholder="Warum interessiert dich diese Stelle?"></textarea>
                    </div>
                    <div class="input-group">
                        <label>Lebenslauf URL</label>
                        <input id="apply-cv" type="url" placeholder="https://..." />
                    </div>
                    <div class="input-group">
                        <label>Anschreiben URL</label>
                        <input id="apply-cover" type="url" placeholder="https://..." />
                    </div>
                    <button type="submit" class="btn btn-primary btn-full btn-lg">
                        <i data-lucide="send" style="width:16px; height:16px"></i> Bewerbung absenden
                    </button>
                </form>

                <div id="apply-success" class="hidden" style="text-align: center; padding: 2rem 0">
                    <i data-lucide="check-circle" style="width:48px; height:48px; color: var(--success); margin-bottom: 1rem"></i>
                    <h3 style="color: var(--success)">Bewerbung gesendet!</h3>
                    <p style="color: var(--text-muted); margin-top: 0.5rem">Du kannst den Status in deinem Dashboard verfolgen.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:3000/api";
        const jobId = new URLSearchParams(window.location.search).get('id');
        const user = JSON.parse(localStorage.getItem("karriko_user"));

        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();

            if (!jobId) { document.getElementById('job-title').textContent = 'Keine Stelle ausgewählt'; return; }

            try {
                const res = await fetch(`${API_URL}/jobs/${jobId}`);
                const job = await res.json();

                document.title = `${job.title} | Karriko`;
                document.getElementById('job-title').textContent = job.title;
                document.getElementById('job-company').textContent = job.company_name;
                document.getElementById('job-company-link').href = `company.html?name=${encodeURIComponent(job.company_name)}`;
                document.getElementById('job-description').textContent = job.description || "Keine Beschreibung verfügbar.";
                document.getElementById('job-requirements').textContent = job.requirements || "Keine spezifischen Anforderungen angegeben.";

                if (job.image_url) document.getElementById('job-image').src = job.image_url;

                const infoGrid = document.getElementById('job-info-grid');
                infoGrid.innerHTML = `
                    <div class="job-info-item"><i data-lucide="map-pin" style="width:16px; height:16px"></i> ${job.location || 'Standort'}</div>
                    <div class="job-info-item"><i data-lucide="calendar" style="width:16px; height:16px"></i> Start: ${job.start_date || 'Flexibel'}</div>
                    <div class="job-info-item"><i data-lucide="clock" style="width:16px; height:16px"></i> Vollzeit-Ausbildung</div>
                `;
                lucide.createIcons();

                // Show apply form or auth notice
                if (user && user.role === 'azubi') {
                    document.getElementById('apply-form').classList.remove('hidden');
                } else if (user) {
                    document.getElementById('apply-auth-notice').classList.remove('hidden');
                    document.getElementById('apply-auth-notice').innerHTML = '<p style="color:var(--text-muted)">Nur Azubi-Accounts können sich bewerben.</p>';
                } else {
                    document.getElementById('apply-auth-notice').classList.remove('hidden');
                }

                // Apply form submit
                document.getElementById('apply-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    try {
                        const payload = {
                            job_id: parseInt(jobId),
                            user_id: user.id,
                            message: document.getElementById('apply-message').value,
                            cv_url: document.getElementById('apply-cv').value,
                            cover_url: document.getElementById('apply-cover').value,
                        };
                        const res = await fetch(`${API_URL}/applications`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload),
                        });
                        const data = await res.json();
                        if (data.success) {
                            document.getElementById('apply-form').classList.add('hidden');
                            document.getElementById('apply-success').classList.remove('hidden');
                            lucide.createIcons();
                        } else {
                            alert(data.message || 'Fehler bei der Bewerbung');
                        }
                    } catch (err) {
                        alert('Serverfehler: ' + err.message);
                    }
                });

            } catch (e) {
                console.error(e);
                document.getElementById('job-title').textContent = 'Stelle nicht gefunden';
            }
        });
    </script>
</body>
</html>
