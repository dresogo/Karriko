<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Karriko</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav class="navbar glass" id="main-navbar">
        <div class="logo"><a href="index.html">Karriko</a><span class="logo-dot"></span> <span style="color: var(--error); font-size: 0.75rem; font-weight: 600; margin-left: 0.5rem">ADMIN</span></div>
        <div class="nav-actions">
            <a href="index.html" class="nav-link">Startseite</a>
            <button id="btn-logout" class="btn btn-secondary btn-sm">Logout</button>
        </div>
    </nav>

    <div class="dashboard-header">
        <div class="container">
            <h1 style="font-size: 1.75rem">Administration</h1>
            <p style="color: var(--text-muted)">Moderiere Inhalte und verwalte Benutzer.</p>
        </div>
    </div>

    <div class="container" style="padding-bottom: 4rem">
        <!-- Stats -->
        <div class="grid grid-4" style="margin-bottom: 2rem" id="admin-stats">
            <div class="card stat-card">
                <div class="stat-value" id="s-users">0</div>
                <div class="stat-label">Benutzer</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" id="s-companies">0</div>
                <div class="stat-label">Unternehmen</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" id="s-reviews">0</div>
                <div class="stat-label">Bewertungen</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" id="s-apps">0</div>
                <div class="stat-label">Bewerbungen</div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="users" onclick="switchTab('users')">
                <i data-lucide="users" style="width:16px;height:16px"></i> Benutzer
            </div>
            <div class="tab" data-tab="reviews" onclick="switchTab('reviews')">
                <i data-lucide="star" style="width:16px;height:16px"></i> Bewertungen
            </div>
            <div class="tab" data-tab="companies" onclick="switchTab('companies')">
                <i data-lucide="building-2" style="width:16px;height:16px"></i> Unternehmen
            </div>
        </div>

        <!-- Users Tab -->
        <div id="tab-users" class="tab-content">
            <div id="users-table"></div>
        </div>

        <!-- Reviews Tab -->
        <div id="tab-reviews" class="tab-content hidden">
            <div id="reviews-table"></div>
        </div>

        <!-- Companies Tab -->
        <div id="tab-companies" class="tab-content hidden">
            <div id="companies-table"></div>
        </div>
    </div>

    <script>
        const API = "http://localhost:3000/api";
        const currentUser = JSON.parse(localStorage.getItem("karriko_user"));

        if (!currentUser || currentUser.role !== "superadmin") {
            document.body.innerHTML = '<main class="container section"><h2>Zugriff verweigert</h2><p>Nur Administratoren können auf diese Seite zugreifen.</p><a href="index.html" class="btn btn-primary" style="margin-top:1rem">Zurück</a></main>';
            throw new Error("Not admin");
        }

        document.getElementById('btn-logout').addEventListener('click', () => {
            localStorage.removeItem('karriko_user');
            window.location.href = 'index.html';
        });

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadStats();
            loadUsers();
            loadAllReviews();
            loadAllCompanies();
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API}/admin/stats`);
                const s = await res.json();
                document.getElementById('s-users').textContent = s.users || 0;
                document.getElementById('s-companies').textContent = s.companies || 0;
                document.getElementById('s-reviews').textContent = s.reviews || 0;
                document.getElementById('s-apps').textContent = s.applications || 0;
            } catch (e) { console.error(e); }
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${API}/admin/users`);
                const users = await res.json();
                const roleColors = { superadmin: 'tag-primary', azubi: 'tag-success', unternehmen: 'tag-warning' };

                document.getElementById('users-table').innerHTML = `
                    <table class="data-table">
                        <thead><tr><th>ID</th><th>Name</th><th>E-Mail</th><th>Rolle</th><th>Registriert</th><th>Aktionen</th></tr></thead>
                        <tbody>
                            ${users.map(u => `
                                <tr>
                                    <td>${u.id}</td>
                                    <td><strong>${u.username || '-'}</strong></td>
                                    <td>${u.email}</td>
                                    <td><span class="tag ${roleColors[u.role] || 'tag-neutral'}">${u.role}</span></td>
                                    <td>${new Date(u.created_at).toLocaleDateString('de-DE')}</td>
                                    <td>${u.role !== 'superadmin' ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">Löschen</button>` : ''}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) { console.error(e); }
        }

        async function loadAllReviews() {
            try {
                const res = await fetch(`${API}/reviews?limit=100`);
                const reviews = await res.json();

                document.getElementById('reviews-table').innerHTML = `
                    <table class="data-table">
                        <thead><tr><th>ID</th><th>Benutzer</th><th>Unternehmen</th><th>Bewertung</th><th>Text</th><th>Aktionen</th></tr></thead>
                        <tbody>
                            ${reviews.map(r => `
                                <tr>
                                    <td>${r.id}</td>
                                    <td>${r.user} ${r.anonymous ? '<span class="tag tag-neutral" style="font-size:0.65rem">anonym</span>' : ''}</td>
                                    <td>${r.company}</td>
                                    <td><span class="review-stars">${"★".repeat(Math.round(r.rating))}</span></td>
                                    <td style="max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap">${r.text}</td>
                                    <td><button class="btn btn-danger btn-sm" onclick="deleteReview(${r.id})">Löschen</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) { console.error(e); }
        }

        async function loadAllCompanies() {
            try {
                const res = await fetch(`${API}/companies`);
                const companies = await res.json();

                document.getElementById('companies-table').innerHTML = `
                    <table class="data-table">
                        <thead><tr><th>ID</th><th>Name</th><th>Branche</th><th>Standort</th><th>Bewertungen</th><th>Ø Rating</th></tr></thead>
                        <tbody>
                            ${companies.map(c => `
                                <tr style="cursor: pointer" onclick="window.location.href='company.html?name=${encodeURIComponent(c.name)}'">
                                    <td>${c.id}</td>
                                    <td><strong>${c.name}</strong></td>
                                    <td>${c.industry || '-'}</td>
                                    <td>${c.location || '-'}</td>
                                    <td>${c.review_count || 0}</td>
                                    <td><span class="rating-badge" style="font-size: 0.8rem; padding: 0.2rem 0.5rem">${c.avg_rating ? parseFloat(c.avg_rating).toFixed(1) : '0.0'} ★</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) { console.error(e); }
        }

        async function deleteUser(id) {
            if (!confirm('Benutzer wirklich löschen? Alle seine Daten werden entfernt.')) return;
            try {
                await fetch(`${API}/admin/users/${id}`, { method: 'DELETE' });
                loadUsers();
                loadStats();
            } catch (e) { console.error(e); }
        }

        async function deleteReview(id) {
            if (!confirm('Bewertung wirklich löschen?')) return;
            try {
                await fetch(`${API}/admin/reviews/${id}`, { method: 'DELETE' });
                loadAllReviews();
                loadStats();
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
