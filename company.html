<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unternehmensprofil | Karriko</title>
    <meta name="description" content="Unternehmensprofil und Bewertungen auf Karriko." />
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      .reviews-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        flex-wrap: wrap;
        gap: 1rem;
      }
      .review-reply {
        background: var(--bg-alt);
        border-left: 3px solid var(--primary);
        padding: 1rem;
        margin-top: 1rem;
        border-radius: 0 var(--radius-md) var(--radius-md) 0;
        font-size: 0.9rem;
      }
      .review-reply strong {
        color: var(--primary);
      }
      .review-actions {
        display: flex;
        gap: 0.75rem;
        margin-top: 1rem;
        align-items: center;
      }
      .helpful-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        background: none;
        border: 1px solid var(--border);
        padding: 0.3rem 0.7rem;
        border-radius: var(--radius-full);
        font-size: 0.8rem;
        color: var(--text-muted);
        cursor: pointer;
        transition: var(--transition-fast);
        font-family: inherit;
      }
      .helpful-btn:hover {
        border-color: var(--primary);
        color: var(--primary);
        background: var(--primary-light);
      }
      .company-desc {
        color: var(--text-secondary);
        margin-top: 0.75rem;
        font-size: 0.95rem;
        line-height: 1.7;
      }
      .company-industry {
        color: var(--text-muted);
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
      }
      .rating-modal-content { max-width: 640px; }
      .step-indicator {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 2rem;
      }
      .step-dot {
        width: 40px;
        height: 4px;
        border-radius: 2px;
        background: var(--border);
        transition: var(--transition-base);
      }
      .step-dot.active { background: var(--primary); }
      .step-dot.done { background: var(--success); }
      .category-step { display: none; }
      .category-step.active { display: block; }

      @media (max-width: 768px) {
        .company-header-bg { height: 200px; }
        .reviews-controls { flex-direction: column; align-items: flex-start; }
        #btn-rate { width: 100%; margin-top: 1rem; }
      }
    </style>
  </head>

  <body>
    <nav class="navbar glass" id="main-navbar">
      <div class="logo"><a href="index.html">Karriko</a><span class="logo-dot"></span></div>
      <div class="nav-actions">
        <a href="jobs.html" class="nav-link">Ausbildungsplätze</a>
        <div id="auth-buttons">
          <button id="btn-login" class="btn btn-secondary btn-sm">Anmelden</button>
          <button id="btn-register" class="btn btn-primary btn-sm">Registrieren</button>
        </div>
        <div id="user-profile" class="hidden">
          <span id="user-name">Profil</span>
          <button id="btn-logout" class="btn btn-secondary btn-sm">Logout</button>
        </div>
      </div>
    </nav>

    <div class="company-header-bg" id="company-header"
      style="background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=1200&q=80'); background-size: cover; background-position: center;">
    </div>

    <div class="container">
      <div class="company-info">
        <div class="company-logo" id="company-logo">LO</div>
        <div class="company-meta">
          <div class="company-industry" id="company-industry">
            <i data-lucide="building-2" style="width:16px; height:16px"></i>
            <span>Branche</span>
          </div>
          <h1 id="company-name" style="font-size: 2.25rem">Lade Daten...</h1>
          <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-top: 0.5rem">
            <div class="rating-badge">
              <i data-lucide="star" style="width:16px; height:16px; fill: currentColor"></i>
              <span id="avg-rating">-</span>
            </div>
            <span style="color: var(--text-muted); font-size: 0.9rem" id="total-reviews">(- Bewertungen)</span>
          </div>
        </div>
        <button id="btn-rate" class="btn btn-primary btn-lg">
          <i data-lucide="pen-line" style="width:18px; height:18px"></i> Jetzt bewerten
        </button>
      </div>

      <p class="company-desc" id="company-desc"></p>

      <!-- Content Grid -->
      <div class="grid" style="grid-template-columns: 2fr 1fr; gap: 3rem; margin-top: 2rem; margin-bottom: 4rem">
        <!-- Reviews Column -->
        <div>
          <div class="reviews-controls">
            <h3>Bewertungen</h3>
            <select id="sort-select" class="btn btn-secondary btn-sm" style="padding: 0.5rem 1rem">
              <option value="newest">Neueste zuerst</option>
              <option value="best">Beste zuerst</option>
            </select>
          </div>
          <div id="reviews-list" class="grid" style="grid-template-columns: 1fr; gap: 1.25rem">
            <!-- Reviews go here -->
          </div>
        </div>

        <!-- Sidebar (Jobs) -->
        <div>
          <h3 style="margin-bottom: 1rem">Offene Stellen</h3>
          <div id="jobs-list" class="grid" style="grid-template-columns: 1fr; gap: 1rem">
            <!-- Jobs go here -->
          </div>
        </div>
      </div>
    </div>

    <!-- Rating Modal -->
    <div id="rating-modal" class="modal hidden">
      <div class="modal-content rating-modal-content">
        <span class="close-rating-modal close-modal">&times;</span>
        <h2 style="margin-bottom: 0.5rem">Bewertung abgeben</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem">5 Kategorien – je 5 Fragen. Dein Feedback zählt!</p>

        <div class="step-indicator" id="step-indicator"></div>

        <form id="rating-form">
          <div style="margin-bottom: 1.5rem">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500">Wie möchtest du bewerten?</label>
            <div style="display: flex; gap: 1.5rem; flex-wrap: wrap">
              <label style="display: flex; align-items: center; gap: 0.4rem; cursor: pointer">
                <input type="radio" name="anonymity" value="named" checked />
                <span>Mit Namen <span class="tag tag-success" style="font-size: 0.7rem">100% Gewichtung</span></span>
              </label>
              <label style="display: flex; align-items: center; gap: 0.4rem; cursor: pointer">
                <input type="radio" name="anonymity" value="anonymous" />
                <span>Anonym <span class="tag tag-warning" style="font-size: 0.7rem">50% Gewichtung</span></span>
              </label>
            </div>
          </div>

          <div id="questions-container">
            <!-- Dynamische Kategorien/Fragen kommen hierhin -->
          </div>

          <div class="input-group" id="step-comment" style="display: none">
            <label>Dein Kommentar</label>
            <textarea id="rating-text" rows="4" placeholder="Teile deine Erfahrung..." required></textarea>
          </div>

          <div style="display: flex; gap: 0.75rem; justify-content: flex-end">
            <button type="button" id="btn-prev-step" class="btn btn-secondary" style="display: none">Zurück</button>
            <button type="button" id="btn-next-step" class="btn btn-primary">Weiter</button>
            <button type="submit" id="btn-submit-review" class="btn btn-primary" style="display: none">
              Bewertung veröffentlichen
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-modal close-auth-modal">&times;</span>
        <h2 id="modal-title">Willkommen zurück</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem">Melde dich an, um eine Bewertung zu schreiben.</p>
        <div class="auth-options">
          <button class="btn btn-social" onclick="alert('Demo')">
            <i data-lucide="chrome" style="width:18px; height:18px"></i> Mit Google fortfahren
          </button>
        </div>
        <div class="divider">oder</div>
        <form id="auth-form">
          <div class="input-group">
            <input type="email" id="email" placeholder="E-Mail Adresse" required />
          </div>
          <div class="input-group">
            <input type="password" id="password" placeholder="Passwort" required />
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="auth-submit">Anmelden</button>
        </form>
        <p class="auth-switch">Noch kein Konto? <a href="#" id="switch-auth">Registrieren</a></p>
      </div>
    </div>

    <script src="company.js"></script>
    <script>lucide.createIcons();</script>
  </body>
</html>
