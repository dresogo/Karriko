<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suchergebnisse | Karriko</title>
    <meta name="description" content="Finde Ausbildungsbetriebe auf Karriko – der Bewertungsplattform für Azubis." />
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <nav class="navbar glass" id="main-navbar">
        <div class="logo"><a href="index.html">Karriko</a><span class="logo-dot"></span></div>
        <div class="nav-actions">
            <div class="search-container" style="max-width: 320px; box-shadow: var(--shadow-sm); margin-right: 1rem">
                <i data-lucide="search" class="search-icon" style="margin-left: 0.75rem"></i>
                <input type="text" id="nav-search" placeholder="Suche..." style="padding: 0.5rem 0.75rem; font-size: 0.85rem">
            </div>
            <a href="index.html" class="btn btn-secondary btn-sm">Startseite</a>
        </div>
    </nav>

    <div class="search-page-header">
        <div class="container">
            <div class="search-stats">
                <h2 style="font-size: 1.4rem; margin: 0">
                    <span id="result-count">0</span> Treffer für
                    <span id="search-term" style="color: var(--primary)">...</span>
                </h2>
                <select id="sort-results" class="btn btn-secondary btn-sm" style="padding: 0.5rem 1rem">
                    <option value="relevance">Relevanz</option>
                    <option value="rating">Bewertung</option>
                    <option value="reviews">Meiste Bewertungen</option>
                </select>
            </div>
        </div>
    </div>

    <div class="container section" style="padding-top: 2rem; padding-bottom: 4rem">
        <div class="grid" style="grid-template-columns: 1fr; gap: 1rem" id="results-list">
            <!-- Dynamic Content -->
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-bottom" style="border-top: none; margin-top: 0">
                © 2026 Karriko. Alle Rechte vorbehalten.
            </div>
        </div>
    </footer>

    <script>
        const API_URL = "http://localhost:3000/api";
        let allResults = [];

        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();

            const params = new URLSearchParams(window.location.search);
            const query = params.get('q');

            document.getElementById('search-term').textContent = query || "Alle";

            // Nav search
            const navSearch = document.getElementById('nav-search');
            if (navSearch && query) navSearch.value = query;
            if (navSearch) {
                navSearch.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && navSearch.value) {
                        window.location.href = `search.html?q=${encodeURIComponent(navSearch.value)}`;
                    }
                });
            }

            // Sort
            document.getElementById('sort-results').addEventListener('change', () => {
                renderResults(allResults);
            });

            if (query) {
                try {
                    const res = await fetch(`${API_URL}/companies?search=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    allResults = data;
                    document.getElementById('result-count').textContent = data.length;
                    renderResults(data);
                } catch (e) {
                    console.error(e);
                    document.getElementById('results-list').innerHTML = '<div class="empty-state"><p>Verbindung zum Server fehlgeschlagen.</p></div>';
                }
            } else {
                try {
                    const res = await fetch(`${API_URL}/companies`);
                    const data = await res.json();
                    allResults = data;
                    document.getElementById('result-count').textContent = data.length;
                    document.getElementById('search-term').textContent = "Alle Betriebe";
                    renderResults(data);
                } catch (e) { console.error(e); }
            }
        });

        function renderResults(companies) {
            const list = document.getElementById('results-list');
            const sortVal = document.getElementById('sort-results').value;

            let sorted = [...companies];
            if (sortVal === 'rating') sorted.sort((a, b) => (b.avg_rating || 0) - (a.avg_rating || 0));
            else if (sortVal === 'reviews') sorted.sort((a, b) => (b.review_count || 0) - (a.review_count || 0));

            if (sorted.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="search-x" style="width: 64px; height: 64px; margin-bottom: 1rem"></i>
                        <h3 style="margin-bottom: 0.5rem">Keine Ergebnisse</h3>
                        <p>Versuche es mit einem anderen Suchbegriff.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            list.innerHTML = sorted.map((c, i) => {
                const rating = c.avg_rating ? parseFloat(c.avg_rating).toFixed(1) : "0.0";
                const stars = Math.round(parseFloat(rating));
                return `
                <div class="result-card" onclick="window.location.href='company.html?name=${encodeURIComponent(c.name)}'" style="animation: slideUp 0.4s ease ${i * 0.05}s forwards; opacity: 0">
                    <div class="result-content">
                        <span class="result-title">${c.name}</span>
                        <div class="result-meta">
                            ${c.industry ? `<span class="meta-item"><i data-lucide="briefcase" style="width:14px; height:14px"></i> ${c.industry}</span>` : ''}
                            <span class="meta-item"><i data-lucide="map-pin" style="width:14px; height:14px"></i> ${c.location || 'Deutschland'}</span>
                            <span class="rating-badge" style="font-size: 0.8rem; padding: 0.2rem 0.6rem">
                                ${rating} ★
                            </span>
                            <span class="meta-item" style="color: var(--text-light)">(${c.review_count || 0} Bewertungen)</span>
                        </div>
                        <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 0">
                            ${c.description || "Ein Ausbildungsbetrieb auf Karriko. Entdecke Bewertungen und offene Stellen."}
                        </p>
                    </div>
                    <div class="result-logo">
                        ${c.name.substring(0, 2).toUpperCase()}
                    </div>
                </div>
            `}).join('');
            lucide.createIcons();
        }
    </script>
</body>
</html>
